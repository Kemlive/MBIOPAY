packages:
  "react-qr-code": "For generating wallet address QR codes on deposit and send tabs"
  "framer-motion": "For smooth tab transitions and form step animations"
  "date-fns": "For formatting recent order timestamps"
  "react-hook-form": "For robust form state management in the send tab"
  "@hookform/resolvers": "For zod validation integration with react-hook-form"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"

images:
  - path: "artifacts/remittance-ui/public/images/logo-icon.png"
    description: "A minimal, abstract glowing neon green and cyan geometric logo for a crypto fintech app, dark background, premium"
    aspect_ratio: "1:1"

notes:
  - "Assuming backend API hooks are generated by orval and available at @workspace/api-client-react"
  - "Relying on TanStack Query for data fetching, caching, and polling the order status"
